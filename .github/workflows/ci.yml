name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit report (artifact; nem gate — lásd docs/security-supply-chain.md)
        run: npm run ops:audit-report
        continue-on-error: true

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: .ops/npm-audit-report.json
          if-no-files-found: ignore

      - name: CycloneDX SBOM (artifact; nem gate — lásd docs/security-supply-chain.md)
        run: npm run ops:sbom
        continue-on-error: true

      - name: Upload SBOM (CycloneDX JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cdx
          path: .ops/sbom.cdx.json
          if-no-files-found: ignore

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Backup restore drill
        run: npm run ops:backup-drill

      - name: Test
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Playwright smoke (roles)
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, e2e]
    env:
      DATABASE_URL: file:./dev.db
      # Build + middleware bundle; nem éles titok, csak CI ellenőrzés (min. 32 karakter).
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Dependency risk report
        run: npm run ops:dependency-risk

      - name: Build
        run: npm run build

      - name: Post-deploy smoke gate
        run: npm run ops:smoke-gate

  lighthouse:
    runs-on: ubuntu-latest
    needs: [build]
    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
      NODE_ENV: production
      FF_LIGHTHOUSE_CI_GATE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Lighthouse CI (budget gate)
        run: npm run lhci

  release_checklist:
    runs-on: ubuntu-latest
    needs: [lighthouse]
    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: '0123456789abcdef0123456789abcdef'
      FF_LIGHTHOUSE_CI_GATE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Release checklist gate
        run: npm run ops:release-checklist
